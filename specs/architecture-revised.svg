<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="rustGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="pyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="tsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="feGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="proxyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">AgentHub Analytics — Service Architecture (Revised)</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#64748b">Docker Compose (local) → nginx proxy  ·  Production → AWS API Gateway + CloudFront + ECS</text>

  <!-- ============ LAYER 1: CLIENTS ============ -->
  <rect x="20" y="72" width="1060" height="86" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="92" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">CLIENTS</text>

  <!-- Browser -->
  <rect x="190" y="100" width="200" height="46" rx="8" fill="white" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="290" y="121" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">🌐 Browser</text>
  <text x="290" y="137" text-anchor="middle" font-size="10" fill="#64748b">End user (Eng Manager)</text>

  <!-- Simulator -->
  <rect x="710" y="100" width="220" height="46" rx="8" fill="url(#tsGrad)" filter="url(#shadow)"/>
  <text x="820" y="121" text-anchor="middle" font-size="13" font-weight="600" fill="white">🤖 Event Simulator</text>
  <text x="820" y="137" text-anchor="middle" font-size="10" fill="#e0d4fc">TypeScript · Faker.js · Node.js</text>

  <!-- ============ LAYER 2: EDGE / ROUTING ============ -->
  <rect x="20" y="172" width="1060" height="86" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="40" y="192" font-size="10" font-weight="600" fill="#b45309" letter-spacing="1">EDGE / ROUTING</text>

  <!-- nginx / API Gateway -->
  <rect x="190" y="200" width="460" height="46" rx="8" fill="url(#proxyGrad)" filter="url(#shadow)"/>
  <text x="420" y="221" text-anchor="middle" font-size="13" font-weight="600" fill="white">🔀 nginx (local) → AWS API Gateway + CloudFront (prod)</text>
  <text x="420" y="237" text-anchor="middle" font-size="10" fill="#fef3c7">Static files · /api/* → Analytics API · /ingest/* → Ingestion · CORS · Rate Limiting</text>

  <!-- ============ LAYER 3: APPLICATION SERVICES ============ -->
  <rect x="20" y="272" width="1060" height="175" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="40" y="292" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="1">APPLICATION SERVICES  (Docker containers → ECS Fargate)</text>

  <!-- Frontend Static -->
  <rect x="50" y="310" width="250" height="56" rx="8" fill="url(#feGrad)" filter="url(#shadow)"/>
  <text x="175" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="white">📊 Dashboard SPA</text>
  <text x="175" y="347" text-anchor="middle" font-size="10" fill="#bfdbfe">React + Vite + TypeScript</text>
  <text x="175" y="360" text-anchor="middle" font-size="9" fill="#93c5fd">Tremor · shadcn/ui · TanStack Query</text>

  <!-- Analytics API -->
  <rect x="340" y="310" width="280" height="56" rx="8" fill="url(#pyGrad)" filter="url(#shadow)"/>
  <text x="480" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="white">📈 Analytics API (BFF)</text>
  <text x="480" y="347" text-anchor="middle" font-size="10" fill="#a7f3d0">Python / FastAPI</text>
  <text x="480" y="360" text-anchor="middle" font-size="9" fill="#6ee7b7">Screen-oriented endpoints · Caching · Filtering</text>

  <!-- Ingestion -->
  <rect x="660" y="310" width="250" height="56" rx="8" fill="url(#rustGrad)" filter="url(#shadow)"/>
  <text x="785" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="white">⚡ Ingestion Service</text>
  <text x="785" y="347" text-anchor="middle" font-size="10" fill="#fed7aa">Rust / Axum</text>
  <text x="785" y="360" text-anchor="middle" font-size="9" fill="#fdba74">Validation · Schema enforcement · Publish</text>

  <!-- Aggregation Worker -->
  <rect x="340" y="385" width="280" height="50" rx="8" fill="url(#pyGrad)" filter="url(#shadow)"/>
  <text x="480" y="407" text-anchor="middle" font-size="13" font-weight="600" fill="white">⚙️ Aggregation Worker</text>
  <text x="480" y="423" text-anchor="middle" font-size="10" fill="#a7f3d0">Python · Stream consumer · Rollup writer</text>

  <!-- ============ LAYER 4: INFRASTRUCTURE ============ -->
  <rect x="20" y="460" width="1060" height="100" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="480" font-size="10" font-weight="600" fill="#475569" letter-spacing="1">DATA INFRASTRUCTURE  (Docker → managed services in prod)</text>

  <!-- Redis -->
  <rect x="80" y="494" width="260" height="54" rx="8" fill="url(#infraGrad)" filter="url(#shadow)"/>
  <text x="210" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="white">🔴 Redis 7</text>
  <text x="210" y="533" text-anchor="middle" font-size="10" fill="#cbd5e1">Streams (event bus) · Cache · Real-time counters</text>

  <!-- PostgreSQL -->
  <rect x="400" y="494" width="260" height="54" rx="8" fill="url(#infraGrad)" filter="url(#shadow)"/>
  <text x="530" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="white">🐘 PostgreSQL 16</text>
  <text x="530" y="533" text-anchor="middle" font-size="10" fill="#cbd5e1">Orgs · Teams · Users · Projects</text>

  <!-- ClickHouse -->
  <rect x="720" y="494" width="290" height="54" rx="8" fill="url(#infraGrad)" filter="url(#shadow)"/>
  <text x="865" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="white">🏛️ ClickHouse 24</text>
  <text x="865" y="533" text-anchor="middle" font-size="10" fill="#cbd5e1">Time-series · Aggregated rollups · Run-level data</text>

  <!-- ============ CONNECTIONS ============ -->
  <!-- Browser → nginx -->
  <line x1="290" y1="146" x2="340" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Simulator → Ingestion (bypasses nginx in local, goes through NLB in prod) -->
  <line x1="820" y1="146" x2="785" y2="310" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="824" y="230" font-size="9" fill="#f97316">POST /ingest/events</text>

  <!-- nginx → Frontend static -->
  <line x1="310" y1="246" x2="230" y2="310" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="240" y="280" font-size="9" fill="#3b82f6">static files</text>

  <!-- nginx → Analytics API -->
  <line x1="420" y1="246" x2="450" y2="310" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="448" y="280" font-size="9" fill="#10b981">/api/*</text>

  <!-- nginx → Ingestion -->
  <line x1="530" y1="246" x2="720" y2="310" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="640" y="273" font-size="9" fill="#f97316">/ingest/*</text>

  <!-- Ingestion → Redis -->
  <line x1="700" y1="366" x2="310" y2="494" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="530" y="420" font-size="9" fill="#f97316">publish events</text>

  <!-- Redis → Worker -->
  <line x1="280" y1="494" x2="400" y2="420" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="310" y="454" font-size="9" fill="#10b981">consume</text>

  <!-- Worker → ClickHouse -->
  <line x1="580" y1="435" x2="770" y2="494" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="670" y="458" font-size="9" fill="#10b981">write rollups</text>

  <!-- Worker → PostgreSQL (enrich) -->
  <line x1="480" y1="435" x2="500" y2="494" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="500" y="468" font-size="8" fill="#94a3b8">enrich</text>

  <!-- Analytics API → ClickHouse -->
  <path d="M 560 366 Q 620 430 760 494" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="660" y="440" font-size="9" fill="#10b981">query</text>

  <!-- Analytics API → PostgreSQL -->
  <line x1="440" y1="366" x2="470" y2="494" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="435" y="432" font-size="8" fill="#94a3b8">org data</text>

  <!-- Analytics API → Redis (cache) -->
  <line x1="370" y1="366" x2="270" y2="494" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="290" y="432" font-size="8" fill="#94a3b8">cache</text>

  <!-- ============ DATA FLOW LEGEND ============ -->
  <rect x="20" y="576" width="1060" height="192" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Write path -->
  <text x="40" y="600" font-size="11" font-weight="700" fill="#0f172a">Write Path (event ingestion)</text>
  <rect x="40" y="610" width="1020" height="32" rx="6" fill="#fff7ed"/>
  <text x="50" y="631" font-size="10" fill="#9a3412">Simulator</text>
  <text x="112" y="631" font-size="10" fill="#94a3b8">→</text>
  <text x="130" y="631" font-size="10" fill="#9a3412" font-weight="600">Ingestion (Rust)</text>
  <text x="255" y="631" font-size="10" fill="#94a3b8">validates →</text>
  <text x="320" y="631" font-size="10" fill="#475569" font-weight="600">Redis Streams</text>
  <text x="428" y="631" font-size="10" fill="#94a3b8">→</text>
  <text x="445" y="631" font-size="10" fill="#059669" font-weight="600">Aggregation Worker (Python)</text>
  <text x="660" y="631" font-size="10" fill="#94a3b8">enriches + rolls up →</text>
  <text x="810" y="631" font-size="10" fill="#475569" font-weight="600">ClickHouse</text>

  <!-- Read path -->
  <text x="40" y="662" font-size="11" font-weight="700" fill="#0f172a">Read Path (dashboard queries)</text>
  <rect x="40" y="672" width="1020" height="32" rx="6" fill="#ecfdf5"/>
  <text x="50" y="693" font-size="10" fill="#1e293b">Browser</text>
  <text x="100" y="693" font-size="10" fill="#94a3b8">→</text>
  <text x="115" y="693" font-size="10" fill="#b45309" font-weight="600">nginx / API Gateway</text>
  <text x="270" y="693" font-size="10" fill="#94a3b8">routes →</text>
  <text x="330" y="693" font-size="10" fill="#059669" font-weight="600">Analytics API (Python · BFF)</text>
  <text x="540" y="693" font-size="10" fill="#94a3b8">→</text>
  <text x="555" y="693" font-size="10" fill="#475569" font-weight="600">ClickHouse + PostgreSQL + Redis</text>

  <!-- Service count -->
  <text x="40" y="730" font-size="11" font-weight="700" fill="#0f172a">Service Count</text>
  <text x="40" y="752" font-size="10" fill="#64748b">5 custom services (Frontend SPA, Analytics API, Ingestion, Aggregation Worker, Simulator) + 3 infrastructure (Redis, PostgreSQL, ClickHouse) + 1 proxy (nginx)</text>
</svg>

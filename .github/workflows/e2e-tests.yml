name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# E2E tests use docker-compose.yml only (prod targets — Playwright container
# tests the production stack through nginx).

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DC: docker compose -f docker-compose.yml

    steps:
      - uses: actions/checkout@v4

      - name: Set up port configuration
        run: |
          cat > .env <<'EOF'
          HOST_PORT_NGINX=8080
          HOST_PORT_REDIS=6379
          HOST_PORT_POSTGRES=5432
          HOST_PORT_CLICKHOUSE_HTTP=8123
          HOST_PORT_CLICKHOUSE_NATIVE=9000
          EOF

      - name: Build and start full stack
        run: $DC up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Docker health checks..."
          for i in $(seq 1 90); do
            if $DC ps --format json | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health','') not in ('healthy','')]
          if unhealthy:
              print(f'Waiting: {unhealthy}')
              sys.exit(1)
          print('All healthy')
          " 2>/dev/null; then
                break
            fi
            sleep 2
          done

      - name: Verify API reachable through nginx
        run: |
          echo "Verifying API is reachable through nginx..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "API health check passed through nginx"
              break
            fi
            echo "Attempt $i: API not yet reachable, retrying..."
            sleep 3
          done
          curl -sf http://localhost:8080/api/health \
            || (echo "API never became reachable" && $DC logs analytics-api nginx --tail=30 && exit 1)

      - name: Verify ingestion reachable through nginx
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ingest/health > /dev/null 2>&1; then
              echo "Ingestion health check passed through nginx"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/ingest/health \
            || (echo "Ingestion never became reachable" && $DC logs ingestion nginx --tail=30 && exit 1)

      - name: Wait for simulator to seed data
        run: |
          echo "Waiting for simulator to seed data..."
          for i in $(seq 1 120); do
            if $DC logs simulator 2>&1 | grep -q "Live Mode"; then
              echo "Simulator seeding complete"
              break
            fi
            sleep 2
          done

      - name: Verify API still healthy after seeding
        run: |
          echo "Re-verifying analytics-api is reachable after data seeding..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "API health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i: API not reachable, retrying..."
            sleep 2
          done
          curl -sf http://localhost:8080/api/health \
            || (echo "API not healthy after seeding" && $DC logs analytics-api --tail=50 && exit 1)

      - name: Run E2E tests
        run: $DC --profile testing run --rm --build --no-deps e2e

      - name: Show service logs on failure
        if: failure()
        run: $DC logs --tail=100

      - name: Tear down
        if: always()
        run: $DC down -v

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Shared .env setup — only HOST_PORT_* vars (used by docker-compose.yml
# for port mapping). Service-level env vars come from the compose file itself.
# Using -f docker-compose.yml to skip the dev override file.

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up port configuration
        run: |
          cat > .env <<'EOF'
          HOST_PORT_NGINX=8080
          HOST_PORT_REDIS=6379
          HOST_PORT_POSTGRES=5432
          HOST_PORT_CLICKHOUSE_HTTP=8123
          HOST_PORT_CLICKHOUSE_NATIVE=9000
          EOF

      - name: Build and start services
        run: docker compose -f docker-compose.yml up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml ps --format json | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health','') not in ('healthy','')]
          if unhealthy:
              print(f'Waiting: {unhealthy}')
              sys.exit(1)
          print('All healthy')
          " 2>/dev/null; then
                break
            fi
            sleep 2
          done

      - name: Run simulator tests
        run: docker compose -f docker-compose.yml exec -T simulator npm run test

      - name: Run ingestion tests
        run: docker compose -f docker-compose.yml exec -T ingestion cargo test

      - name: Run aggregation worker tests
        run: docker compose -f docker-compose.yml exec -T aggregation-worker pytest -v

      - name: Run analytics API tests
        run: docker compose -f docker-compose.yml exec -T analytics-api pytest -v

      - name: Run frontend tests
        run: docker compose -f docker-compose.yml exec -T frontend npm run test

      - name: Run TypeScript type check (simulator)
        run: docker compose -f docker-compose.yml exec -T simulator npm run lint

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up port configuration
        run: |
          cat > .env <<'EOF'
          HOST_PORT_NGINX=8080
          HOST_PORT_REDIS=6379
          HOST_PORT_POSTGRES=5432
          HOST_PORT_CLICKHOUSE_HTTP=8123
          HOST_PORT_CLICKHOUSE_NATIVE=9000
          EOF

      - name: Build and start full stack
        run: docker compose -f docker-compose.yml up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Docker health checks..."
          for i in $(seq 1 90); do
            if docker compose -f docker-compose.yml ps --format json | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health','') not in ('healthy','')]
          if unhealthy:
              print(f'Waiting: {unhealthy}')
              sys.exit(1)
          print('All healthy')
          " 2>/dev/null; then
                break
            fi
            sleep 2
          done

      - name: Wait for API to be reachable through nginx
        run: |
          echo "Verifying API is reachable through nginx..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "API health check passed through nginx"
              break
            fi
            echo "Attempt $i: API not yet reachable, retrying..."
            sleep 3
          done
          # Final check — fail the step if still unreachable
          curl -sf http://localhost:8080/api/health || (echo "API never became reachable" && docker compose -f docker-compose.yml logs analytics-api nginx --tail=30 && exit 1)

      - name: Wait for ingestion to be reachable through nginx
        run: |
          echo "Verifying ingestion is reachable through nginx..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ingest/health > /dev/null 2>&1; then
              echo "Ingestion health check passed through nginx"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/ingest/health || (echo "Ingestion never became reachable" && docker compose -f docker-compose.yml logs ingestion nginx --tail=30 && exit 1)

      - name: Wait for simulator to seed data
        run: |
          echo "Waiting for simulator to seed data..."
          for i in $(seq 1 120); do
            if docker compose -f docker-compose.yml logs simulator 2>&1 | grep -q "Live Mode"; then
              echo "Simulator seeding complete"
              break
            fi
            sleep 2
          done

      - name: Run E2E tests
        run: docker compose -f docker-compose.yml --profile testing run --rm --build e2e

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v

# CI overrides — dev build targets for test tooling, without volume mounts.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d
services:
  analytics-api:
    build:
      context: ./analytics-api
      target: dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  aggregation-worker:
    build:
      context: ./aggregation-worker
      target: dev

  ingestion:
    build:
      context: ./ingestion
      target: dev

  simulator:
    build:
      context: ./simulator
      target: dev

  frontend:
    build:
      context: ./frontend
      target: dev
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "80"]

# Development overrides — auto-merged by `docker compose up`.
# To run production images: docker compose -f docker-compose.yml up --build
services:
  analytics-api:
    build:
      context: ./analytics-api
      target: dev
    volumes:
      - ./analytics-api:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  aggregation-worker:
    build:
      context: ./aggregation-worker
      target: dev
    volumes:
      - ./aggregation-worker:/app

  ingestion:
    build:
      context: ./ingestion
      target: dev
    volumes:
      - ./ingestion:/app
      - /app/target
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/ingest/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  simulator:
    build:
      context: ./simulator
      target: dev
    volumes:
      - ./simulator:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "80"]

  e2e:
    build:
      context: ./tests/e2e
    environment:
      BASE_URL: http://nginx:80
    depends_on:
      - nginx
    profiles:
      - testing

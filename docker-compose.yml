# Port isolation: each branch uses different host ports.
# Run ./scripts/setup-ports.sh to configure ports for this branch.
# The script manages a marked section in .env (auto-read by docker compose).

x-database-env: &database-env
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: clickhouse_dev
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: agenthub
  POSTGRES_USER: agenthub
  POSTGRES_PASSWORD: agenthub_dev
  REDIS_HOST: redis
  REDIS_PORT: "6379"

services:
  # --- Infrastructure ---

  redis:
    image: redis:8-alpine
    ports:
      - "${HOST_PORT_REDIS:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_dev
    ports:
      - "${HOST_PORT_POSTGRES:-5432}:5432"
    volumes:
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.1
    environment:
      CLICKHOUSE_PASSWORD: clickhouse_dev
    ports:
      - "${HOST_PORT_CLICKHOUSE_HTTP:-8123}:8123"
      - "${HOST_PORT_CLICKHOUSE_NATIVE:-9000}:9000"
    volumes:
      - ./init-scripts/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "clickhouse_dev", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---

  ingestion:
    build:
      context: ./ingestion
      target: prod
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/ingest/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  analytics-api:
    build:
      context: ./analytics-api
      target: prod
    environment:
      <<: *database-env
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  aggregation-worker:
    build:
      context: ./aggregation-worker
      target: prod
    environment:
      <<: *database-env
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  simulator:
    build:
      context: ./simulator
      target: prod
    environment:
      <<: *database-env
      INGESTION_URL: http://ingestion:8001
      SIMULATOR_BACKFILL_DAYS: "90"
      SIMULATOR_LIVE_EVENTS_PER_SEC: "3"
    depends_on:
      ingestion:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on: []

  # --- Reverse Proxy ---

  nginx:
    image: nginx:alpine
    ports:
      - "${HOST_PORT_NGINX:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      analytics-api:
        condition: service_healthy
      ingestion:
        condition: service_healthy

  # --- E2E Tests (opt-in via --profile testing) ---

  e2e:
    build:
      context: ./tests/e2e
    environment:
      BASE_URL: http://nginx:80
    depends_on:
      - nginx
    profiles:
      - testing
